<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#121212" />
  <title>Music</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <!-- ── SIDEBAR (desktop) ──────────────────────────── -->
    <aside class="sidebar" id="sidebar">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="#1ed760" aria-hidden="true">
          <path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/>
        </svg>
        <span class="logo-text">Music</span>
      </div>

      <nav class="sidebar-nav" aria-label="Main navigation">
        <button class="nav-item active" data-view="library" aria-current="page">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/>
          </svg>
          Library
        </button>
        <button class="nav-item" data-view="clock">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/>
          </svg>
          Clock
        </button>
      </nav>

      <div class="sidebar-clock-wrap">
        <div class="sidebar-clock-time" id="sidebar-time">00:00:00</div>
        <div class="sidebar-clock-date" id="sidebar-date">—</div>
      </div>
    </aside>

    <!-- ── MAIN CONTENT ───────────────────────────────── -->
    <main class="main" id="main">

      <!-- Library View -->
      <section class="view" id="view-library" aria-label="Library">
        <header class="view-header">
          <h1 class="section-title">Your Library</h1>
          <label class="btn-add" for="file-input" role="button" tabindex="0" aria-label="Add music">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
            </svg>
            Add Music
          </label>
          <input type="file" id="file-input" accept="audio/*" multiple hidden />
        </header>

        <div class="tracks-list" id="tracks-list" role="list" aria-live="polite"></div>

        <div class="empty-state" id="empty-state">
          <div class="empty-icon" aria-hidden="true">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="#4d4d4d">
              <path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/>
            </svg>
          </div>
          <p class="empty-title">No music yet</p>
          <p class="empty-sub">Tap <strong>Add Music</strong> to upload tracks from your device.</p>
        </div>
      </section>

      <!-- Clock View -->
      <section class="view hidden" id="view-clock" aria-label="Clock">
        <div class="clock-fullscreen">
          <div class="clock-big" id="clock-big" aria-live="off">00:00:00</div>
          <div class="clock-date-big" id="clock-date-big">—</div>
          <div class="clock-np" id="clock-np">No track playing</div>
        </div>
      </section>

    </main>

    <!-- ── PLAYER BAR ─────────────────────────────────── -->
    <div class="player-bar" id="player-bar" role="region" aria-label="Now playing">
      <!-- Track info -->
      <div class="pb-track" id="pb-track">
        <div class="pb-art" id="pb-art" aria-hidden="true">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="#b3b3b3">
            <path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/>
          </svg>
        </div>
        <div class="pb-meta">
          <div class="pb-name" id="pb-name">—</div>
          <div class="pb-artist" id="pb-artist">No track selected</div>
        </div>
      </div>

      <!-- Center controls -->
      <div class="pb-center">
        <div class="pb-buttons">
          <button class="ctrl-btn" id="btn-shuffle" aria-label="Shuffle" title="Shuffle">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/>
            </svg>
          </button>
          <button class="ctrl-btn" id="btn-prev" aria-label="Previous">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
            </svg>
          </button>
          <button class="ctrl-btn play-btn" id="btn-play" aria-label="Play">
            <svg class="icon-play" width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
              <path d="M8 5v14l11-7z"/>
            </svg>
            <svg class="icon-pause hidden" width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
            </svg>
          </button>
          <button class="ctrl-btn" id="btn-next" aria-label="Next">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
            </svg>
          </button>
          <button class="ctrl-btn active" id="btn-repeat" aria-label="Repeat" title="Repeat all">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>
            </svg>
          </button>
        </div>
        <div class="pb-progress-row">
          <span class="pb-time" id="time-cur">0:00</span>
          <div class="pb-progress-track" id="progress-track" role="slider" aria-label="Seek" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" tabindex="0">
            <div class="pb-progress-fill" id="progress-fill"></div>
            <div class="pb-progress-thumb" id="progress-thumb"></div>
          </div>
          <span class="pb-time" id="time-tot">0:00</span>
        </div>
      </div>

      <!-- Right controls -->
      <div class="pb-right">
        <div class="pb-clock" id="pb-clock">00:00</div>
        <button class="ctrl-btn timer-trigger" id="btn-timer" aria-label="Sleep timer">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M15 1H9v2h6V1zm-4 13h2V8h-2v6zm8.03-6.61 1.42-1.42c-.43-.51-.9-.99-1.41-1.41l-1.42 1.42A6.973 6.973 0 0 0 12 5c-3.87 0-7 3.13-7 7s3.13 7 7 7 7-3.13 7-7a6.98 6.98 0 0 0-2.97-5.61z"/>
          </svg>
          <span class="timer-badge hidden" id="timer-badge">●</span>
        </button>
        <div class="volume-row">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#b3b3b3" aria-hidden="true">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
          </svg>
          <input type="range" id="volume" class="volume-slider" min="0" max="1" step="0.02" value="1" aria-label="Volume" />
        </div>
      </div>
    </div>

    <!-- ── BOTTOM NAV (mobile) ────────────────────────── -->
    <nav class="bottom-nav" id="bottom-nav" aria-label="Mobile navigation">
      <button class="bnav-item active" data-view="library">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/>
        </svg>
        <span>Library</span>
      </button>
      <button class="bnav-item" data-view="player">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/>
        </svg>
        <span>Player</span>
      </button>
      <button class="bnav-item" data-view="clock">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/>
        </svg>
        <span>Clock</span>
      </button>
    </nav>

    <!-- ── EXPANDED PLAYER (mobile) ──────────────────── -->
    <div class="player-expanded hidden" id="player-expanded" role="dialog" aria-label="Now playing" aria-modal="true">
      <button class="exp-close" id="exp-close" aria-label="Minimize player">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
          <path d="M7.41 8.59 12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/>
        </svg>
      </button>
      <div class="exp-art" id="exp-art" aria-hidden="true">
        <svg width="80" height="80" viewBox="0 0 24 24" fill="#4d4d4d">
          <path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/>
        </svg>
      </div>
      <div class="exp-meta">
        <div class="exp-name" id="exp-name">—</div>
        <div class="exp-artist" id="exp-artist">No track selected</div>
      </div>
      <div class="exp-progress-row">
        <span class="pb-time" id="exp-time-cur">0:00</span>
        <div class="pb-progress-track exp-progress-track" id="exp-progress-track" role="slider" aria-label="Seek" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" tabindex="0">
          <div class="pb-progress-fill" id="exp-progress-fill"></div>
          <div class="pb-progress-thumb" id="exp-progress-thumb"></div>
        </div>
        <span class="pb-time" id="exp-time-tot">0:00</span>
      </div>
      <div class="exp-buttons">
        <button class="ctrl-btn" id="exp-btn-shuffle" aria-label="Shuffle">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/>
          </svg>
        </button>
        <button class="ctrl-btn" id="exp-btn-prev" aria-label="Previous">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
          </svg>
        </button>
        <button class="ctrl-btn play-btn exp-play-btn" id="exp-btn-play" aria-label="Play">
          <svg class="icon-play" width="36" height="36" viewBox="0 0 24 24" fill="currentColor">
            <path d="M8 5v14l11-7z"/>
          </svg>
          <svg class="icon-pause hidden" width="36" height="36" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
          </svg>
        </button>
        <button class="ctrl-btn" id="exp-btn-next" aria-label="Next">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
          </svg>
        </button>
        <button class="ctrl-btn active" id="exp-btn-repeat" aria-label="Repeat">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>
          </svg>
        </button>
      </div>
      <div class="exp-footer">
        <div class="pb-clock exp-clock-disp" id="exp-clock">00:00</div>
        <button class="ctrl-btn timer-trigger" id="exp-btn-timer" aria-label="Sleep timer">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M15 1H9v2h6V1zm-4 13h2V8h-2v6zm8.03-6.61 1.42-1.42c-.43-.51-.9-.99-1.41-1.41l-1.42 1.42A6.973 6.973 0 0 0 12 5c-3.87 0-7 3.13-7 7s3.13 7 7 7 7-3.13 7-7a6.98 6.98 0 0 0-2.97-5.61z"/>
          </svg>
          <span class="timer-badge hidden" id="exp-timer-badge">●</span>
        </button>
      </div>
    </div>

    <!-- ── TIMER MODAL ────────────────────────────────── -->
    <div class="overlay hidden" id="timer-overlay" role="dialog" aria-modal="true" aria-label="Sleep timer">
      <div class="modal" id="timer-modal">
        <div class="modal-header">
          <h2 class="modal-title">Sleep Timer</h2>
          <button class="modal-close-btn" id="timer-close" aria-label="Close timer">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
            </svg>
          </button>
        </div>
        <p class="modal-sub">Music will automatically stop after:</p>
        <div class="timer-presets">
          <button class="timer-preset" data-min="5">5 min</button>
          <button class="timer-preset" data-min="15">15 min</button>
          <button class="timer-preset" data-min="30">30 min</button>
          <button class="timer-preset" data-min="45">45 min</button>
          <button class="timer-preset" data-min="60">1 hr</button>
          <button class="timer-preset" data-min="90">1.5 hr</button>
          <button class="timer-preset" data-min="120">2 hr</button>
        </div>
        <div class="timer-custom-row">
          <input type="number" id="timer-custom-input" class="timer-custom-field" min="1" max="360" placeholder="Custom (min)" aria-label="Custom timer minutes" />
          <button class="btn-set-custom" id="btn-set-custom">Set</button>
        </div>
        <div class="timer-status-row" id="timer-status-row">
          <div class="timer-status-info">
            <span class="timer-label">Stops in</span>
            <span class="timer-remaining-disp" id="timer-remaining">—</span>
          </div>
          <button class="btn-cancel-timer" id="btn-cancel-timer">Cancel Timer</button>
        </div>
      </div>
    </div>

    <!-- ── UPLOAD DRAG OVERLAY ────────────────────────── -->
    <div class="drop-overlay hidden" id="drop-overlay" aria-hidden="true">
      <div class="drop-inner">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="#1ed760">
          <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
        </svg>
        <p>Drop audio files here</p>
      </div>
    </div>

  </div><!-- #app -->

  <script src="app.js"></script>
</body>
</html>
